name: Deploy FE to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://study-schedule-lms.quangde.cloud/api
          tags: |
            ghcr.io/${{ github.repository_owner }}/istudy-fe:latest
            ghcr.io/${{ github.repository_owner }}/istudy-fe:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/istudy-fe
            cd /opt/istudy-fe

            # Ghi docker-compose.yml mới nhất vào VPS
            cat > docker-compose.yml << 'EOF'
            services:
              istudy-fe:
                image: ghcr.io/kacode357/istudy-fe:latest
                container_name: istudy_fe
                restart: unless-stopped
                expose:
                  - "3000"
                networks:
                  - fe_network
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.istudy-fe.rule=Host(`istudy.quangde.cloud`)"
                  - "traefik.http.routers.istudy-fe.entrypoints=websecure"
                  - "traefik.http.routers.istudy-fe.tls.certresolver=letsencrypt"
                  - "traefik.http.services.istudy-fe.loadbalancer.server.port=3000"

            networks:
              fe_network:
                driver: bridge
            EOF

            # Login ghcr.io
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull image mới nhất
            docker compose pull

            # Dừng và xoá container cũ
            docker compose down

            # Khởi động container mới
            docker compose up -d

            # Xoá image cũ không dùng
            docker image prune -f
